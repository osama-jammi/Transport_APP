# ============ APPLICATION CONFIGURATION ============
spring.application.name=Transport-Livraison
server.port=8082
server.servlet.context-path=/Transport_DEV

# ============ KEYCLOAK LOCAL ============
keycloak.base-url=http://localhost:8080

spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.base-url}/realms/agileo-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.base-url}/realms/agileo-realm/protocol/openid-connect/certs

keycloak.sync.enabled=true
keycloak.admin.timeout=5000
keycloak.admin.retry.max-attempts=3
keycloak.admin.retry.delay=1000

# ============ AUTH MOBILE (JWT backend HS256 + QR chiffre AES) ============
app.jwt.secret=localJWTsecret1234567890123456789012
app.jwt.expiration-days=365
app.qr.aes-key=localAESkey123456789012345678901
app.mobile.seed-admin-username=admin
app.mobile.seed-admin-password=Admin@2026

# ============ CORS LOCAL ============
cors.allowed-origins=http://localhost:4200,http://localhost:8082
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true

# ============ PRIMARY DataSource (Transport local) ============
spring.datasource.primary.jdbc-url=jdbc:sqlserver://localhost:1433;databaseName=Transport_DEV;encrypt=true;trustServerCertificate=true;
spring.datasource.primary.username=sa
spring.datasource.primary.password=sasa
spring.datasource.primary.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.primary.hikari.maximum-pool-size=20
spring.datasource.primary.hikari.minimum-idle=5
spring.datasource.primary.hikari.idle-timeout=300000
spring.datasource.primary.hikari.pool-name=TransportHikariCP
spring.datasource.primary.hikari.max-lifetime=1200000
spring.datasource.primary.hikari.connection-timeout=30000
spring.datasource.primary.hikari.auto-commit=false

# ============ GAP DataSource local ============
spring.datasource.gap.jdbc-url=jdbc:sqlserver://localhost:1433;databaseName=GapDev;encrypt=true;trustServerCertificate=true;
spring.datasource.gap.username=sa
spring.datasource.gap.password=sasa
spring.datasource.gap.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.gap.hikari.maximum-pool-size=10
spring.datasource.gap.hikari.minimum-idle=2
spring.datasource.gap.hikari.idle-timeout=300000
spring.datasource.gap.hikari.pool-name=GapHikariCP
spring.datasource.gap.hikari.max-lifetime=1200000
spring.datasource.gap.hikari.connection-timeout=30000
spring.datasource.gap.hikari.auto-commit=false

# ============ DIVALTO DataSource local ============
spring.datasource.divalto.jdbc-url=jdbc:sqlserver://localhost:1433;databaseName=RB217_MIG;encrypt=true;trustServerCertificate=true;
spring.datasource.divalto.username=sa
spring.datasource.divalto.password=sasa
spring.datasource.divalto.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.divalto.hikari.maximum-pool-size=10
spring.datasource.divalto.hikari.minimum-idle=1
spring.datasource.divalto.hikari.idle-timeout=300000
spring.datasource.divalto.hikari.pool-name=DivaltoHikariCP
spring.datasource.divalto.hikari.max-lifetime=1200000
spring.datasource.divalto.hikari.connection-timeout=30000
spring.datasource.divalto.hikari.auto-commit=false
spring.datasource.divalto.hikari.initialization-fail-timeout=-1

# ============ STOCK DataSource (lecture seule base DivNet/AGILEO : vue Article_en_stock) ============
# En prod : databaseName=DIVNET_DEV @ 192.168.77.3 (même serveur que Divalto).
spring.datasource.stock.jdbc-url=jdbc:sqlserver://localhost:1433;databaseName=AGILEO;encrypt=true;trustServerCertificate=true;
spring.datasource.stock.username=sa
spring.datasource.stock.password=sasa
spring.datasource.stock.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.stock.hikari.maximum-pool-size=10
spring.datasource.stock.hikari.minimum-idle=1
spring.datasource.stock.hikari.idle-timeout=300000
spring.datasource.stock.hikari.pool-name=StockHikariCP
spring.datasource.stock.hikari.max-lifetime=1200000
spring.datasource.stock.hikari.connection-timeout=30000
spring.datasource.stock.hikari.auto-commit=false
spring.datasource.stock.hikari.initialization-fail-timeout=-1

spring.sql.init.mode=never
management.health.db.enabled=false

# ============ JPA / HIBERNATE ============
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.properties.hibernate.legacy_limit_handler=true
spring.jpa.properties.hibernate.dialect.pagination.offset_fetch_supported=false
spring.jpa.properties.hibernate.dialect.pagination.limit_handler=org.hibernate.dialect.pagination.TopLimitHandler
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.jakarta.persistence.validation.mode=none

spring.jpa.properties.hibernate.current_session_context_class=org.springframework.orm.hibernate5.SpringSessionContext
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

spring.transaction.default-timeout=60
spring.transaction.rollback-on-commit-failure=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=false

# ============ JACKSON ============
spring.jackson.time-zone=Africa/Casablanca
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.write-dates-as-timestamps=false

# ============ FILE UPLOAD ============
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

app.upload.directory=uploads/
app.temp.directory=temp/
app.upload.max-file-size=52428800
app.upload.max-request-size=524288000

# ============ BON DE LIVRAISON (agents FL-PRO-07, cachet/visa) ============
# Noms imprimés sous les cases « Agent de livraison / contrôle qualité / réception ».
# Le chauffeur est rempli automatiquement depuis la livraison. Réception laissé vide par défaut.
app.bl.agent-livraison=ATTAR AHMED
app.bl.agent-controle-qualite=ELFARSALANI Mohamed
app.bl.agent-reception=

# ============ SECURITY ============
spring.main.allow-bean-definition-overriding=true
lombok.equalsAndHashCode.doNotUseGetters=true

# ============ CONTENT NEGOTIATION ============
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.favor-path-extension=false
spring.mvc.contentnegotiation.media-types.json=application/json

# ============ ACTUATOR ============
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true