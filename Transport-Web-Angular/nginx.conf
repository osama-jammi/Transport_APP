# Config Nginx pour servir l'app Angular en production (SPA fallback).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Fichiers statiques avec cache long (hashés par Angular)
  location ~* \.(?:js|css|woff2?|ttf|png|jpg|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Fallback SPA : toute route (dont le callback Keycloak) -> index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy vers le backend Transport (adaptez l'upstream)
  location /Transport/api/ {
    proxy_pass http://transport-backend:8082/Transport_DEV/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }
}
